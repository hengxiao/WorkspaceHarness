name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # -----------------------------------------------------------------------
  # CLI unit tests — always run, even on an uninitialized harness.
  # -----------------------------------------------------------------------
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CLI + test deps
        run: pip install -e cli[test]

      - name: Run pytest
        run: pytest cli/tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # Full pipeline — only meaningful when the harness is initialized
  # (harness.yml + env/Dockerfile exist). Skips cleanly otherwise.
  # -----------------------------------------------------------------------
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Check if harness is initialized
        id: init-check
        run: |
          if [ ! -f harness.yml ] || [ ! -f env/Dockerfile ]; then
            echo "initialized=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Harness is not initialized (no harness.yml or Dockerfile). Skipping pipeline."
          else
            echo "initialized=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build dev image
        if: steps.init-check.outputs.initialized == 'true'
        run: docker build -t harness-dev -f env/Dockerfile .

      - name: Run CI (deps → build → test → lint → report)
        if: steps.init-check.outputs.initialized == 'true'
        run: make -f env/Makefile ci
        continue-on-error: true

      - name: Publish report to job summary
        if: always() && steps.init-check.outputs.initialized == 'true'
        run: |
          if [ -f .harness/reports/report.md ]; then
            cat .harness/reports/report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload reports artifact
        if: always() && steps.init-check.outputs.initialized == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: harness-reports
          path: .harness/reports/

      - name: Upload SARIF for code scanning
        if: always() && hashFiles('.harness/reports/lint/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .harness/reports/lint/results.sarif

      - name: Fail job if overall status is not passed/not_configured
        if: always() && steps.init-check.outputs.initialized == 'true'
        run: |
          test -f .harness/reports/status.json || { echo "::error::no status.json emitted"; exit 1; }
          OVERALL=$(jq -r '.overall' .harness/reports/status.json)
          echo "overall: $OVERALL"
          case "$OVERALL" in
            passed|not_configured) exit 0 ;;
            *)                     exit 1 ;;
          esac

  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CLI
        run: pip install -e cli

      - name: Validate policies
        run: harness policy check --staged

  context-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CLI
        run: pip install -e cli

      - name: Validate context frontmatter and index
        run: harness ctx validate
