# Fallback compose file for an UNINITIALIZED workspace-harness.
# `harness bootstrap` regenerates this from
# cli/src/harness/templates/docker-compose.yml.j2 once harness.yml exists.

services:
  dev:
    build:
      context: ..
      dockerfile: env/Dockerfile
    image: harness-dev
    working_dir: /work
    stdin_open: true
    tty: true
    volumes:
      - ../:/work:cached
      # Persist $HOME across `make down` / `make up`. This catches tool caches
      # that live outside /work (npm, cargo, playwright, pip, gradle, maven, ...)
      # without the harness needing to know any specific tool. `make reset`
      # (docker-compose down -v) wipes it.
      - harness-home:/root
    environment:
      - HARNESS_ROOT=/work
    # HARNESS:KEEP:BEGIN dev-extras
    # Add ports, env, or extra mounts here.
    # HARNESS:KEEP:END dev-extras

volumes:
  harness-home:

# HARNESS:KEEP:BEGIN extra-services
# Declare additional services here.
# HARNESS:KEEP:END extra-services
